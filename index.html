<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="theme-color" content="#FFB800">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Whip App">
  <link rel="manifest" href="manifest.json">
  <title>Whip App</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    body {
      background: #0a0a12;
      background: radial-gradient(ellipse at 50% 20%, #141010 0%, #0a0a12 65%);
      color: #FFB800;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 40px 20px 50px;
      min-height: 100dvh;
    }

    /* ── Scanline overlay ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg,
          transparent,
          transparent 2px,
          #00000009 2px,
          #00000009 4px);
      pointer-events: none;
      z-index: 200;
    }

    /* ── Header ── */
    header {
      text-align: center;
      letter-spacing: 0.3em;
    }

    header h1 {
      font-size: 1.3rem;
      font-weight: bold;
      text-transform: uppercase;
      opacity: 0.85;
      text-shadow: 0 0 20px #FFB80044;
    }

    header p {
      font-size: 0.65rem;
      opacity: 0.4;
      margin-top: 6px;
      letter-spacing: 0.15em;
    }

    /* ── Main area ── */
    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      flex: 1;
      justify-content: center;
    }

    /* ── SVG Whip ── */
    #whip-container {
      position: relative;
      width: 240px;
      height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Corner brackets around the whip */
    #whip-container::before,
    #whip-container::after {
      content: '';
      position: absolute;
      width: 32px;
      height: 32px;
      border-color: #FFB80030;
      border-style: solid;
      pointer-events: none;
    }

    #whip-container::before {
      top: 8px;
      left: 8px;
      border-width: 2px 0 0 2px;
    }

    #whip-container::after {
      bottom: 8px;
      right: 8px;
      border-width: 0 2px 2px 0;
    }

    #whip-svg {
      width: 210px;
      height: 210px;
      filter: drop-shadow(0 0 14px #FFB80055);
      transform-origin: center center;
    }

    #whip-svg.cracking {
      animation: whipCrack 0.45s ease-out forwards;
    }

    @keyframes whipCrack {
      0% {
        transform: rotate(0deg) scale(1);
      }

      15% {
        transform: rotate(-18deg) scale(1.08);
      }

      35% {
        transform: rotate(12deg) scale(0.96);
      }

      55% {
        transform: rotate(-6deg) scale(1.03);
      }

      75% {
        transform: rotate(3deg) scale(0.99);
      }

      100% {
        transform: rotate(0deg) scale(1);
      }
    }

    /* Spark burst */
    .spark {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #FFB800;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .spark.fly {
      animation: sparkFly 0.5s ease-out forwards;
    }

    @keyframes sparkFly {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) translate(0, 0) scale(1);
      }

      100% {
        opacity: 0;
        transform: translate(-50%, -50%) translate(var(--tx), var(--ty)) scale(0.3);
      }
    }

    /* ── Counter ── */
    #counter-wrap {
      text-align: center;
    }

    #counter-label {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      opacity: 0.4;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    #counter {
      font-size: 4.5rem;
      font-weight: bold;
      line-height: 1;
      display: inline-block;
      text-shadow: 0 0 24px #FFB80044;
    }

    #counter.bounce {
      animation: counterBounce 0.35s ease-out forwards;
    }

    @keyframes counterBounce {
      0% {
        transform: scale(1);
      }

      40% {
        transform: scale(1.35);
      }

      70% {
        transform: scale(0.92);
      }

      100% {
        transform: scale(1);
      }
    }

    /* ── Shared screen styles ── */
    .entry-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      text-align: center;
    }

    .entry-screen p {
      font-size: 0.8rem;
      opacity: 0.55;
      line-height: 1.6;
      max-width: 260px;
      letter-spacing: 0.05em;
    }

    /* ── Action buttons (sharp, outlined, terminal-style) ── */
    .action-btn {
      background: none;
      border: 2px solid #FFB800;
      color: #FFB800;
      font-family: 'Courier New', Courier, monospace;
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      padding: 18px 40px;
      cursor: pointer;
      border-radius: 0;
      box-shadow: 0 0 16px #FFB80022;
      transition: background 0.12s, color 0.12s, box-shadow 0.12s;
      -webkit-tap-highlight-color: transparent;
    }

    .action-btn:active {
      background: #FFB800;
      color: #0a0a12;
      box-shadow: 0 0 32px #FFB80055;
    }

    /* ── Tap button ── */
    #tap-btn {
      display: none;
      background: none;
      border: 1px solid #FFB80055;
      color: #FFB80099;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 14px 32px;
      cursor: pointer;
      border-radius: 0;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.12s, color 0.12s, box-shadow 0.12s;
    }

    #tap-btn:active {
      border-color: #FFB800;
      color: #FFB800;
      box-shadow: 0 0 20px #FFB80033;
    }

    /* ── Footer instruction ── */
    footer {
      text-align: center;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      opacity: 0.3;
      text-transform: uppercase;
    }

    /* ── Flash overlay ── */
    #flash {
      position: fixed;
      inset: 0;
      background: #FFB800;
      opacity: 0;
      pointer-events: none;
      z-index: 100;
      transition: opacity 0.04s ease-in;
    }

    #flash.active {
      opacity: 0.65;
      transition: opacity 0.3s ease-out;
    }

    /* ── Permission denied message ── */
    #denied-msg {
      display: none;
      font-size: 0.75rem;
      opacity: 0.6;
      text-align: center;
      max-width: 260px;
      line-height: 1.6;
    }

    /* ── Glow pulse on ready state ── */
    @keyframes idleGlow {

      0%,
      100% {
        filter: drop-shadow(0 0 10px #FFB80033);
      }

      50% {
        filter: drop-shadow(0 0 24px #FFB80088);
      }
    }

    #whip-svg.idle {
      animation: idleGlow 2.8s ease-in-out infinite;
    }

    /* ── Corner flash on crack ── */
    @keyframes cornerFlash {
      0% {
        border-color: #FFB800;
      }

      100% {
        border-color: #FFB80030;
      }
    }

    #whip-container.crack-ring::before,
    #whip-container.crack-ring::after {
      animation: cornerFlash 0.4s ease-out forwards;
    }

    /* ── Fade-in for screens ── */
    @keyframes fadeIn {
      0% {
        opacity: 0;
      }

      100% {
        opacity: 1;
      }
    }

    .fade-in {
      animation: fadeIn 0.35s ease-out both;
    }

    /* ── Share feature ── */
    #share-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: none;
      border: 1px solid #FFB80055;
      color: #FFB800;
      padding: 8px 12px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.75rem;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      z-index: 10;
      transition: all 0.2s;
    }

    #share-btn:hover {
      border-color: #FFB800;
      box-shadow: 0 0 10px #FFB80055;
    }

    #share-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 18, 0.9);
      z-index: 300;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #share-modal.active {
      display: flex;
      animation: fadeIn 0.3s ease-out;
    }

    .share-content {
      background: #141010;
      border: 1px solid #FFB80055;
      padding: 30px;
      box-shadow: 0 0 32px #FFB80044;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      max-width: 90vw;
      width: 320px;
    }

    .share-content h2 {
      font-size: 1rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .share-content img {
      width: 160px;
      height: 160px;
      background: #fff;
      padding: 8px;
    }

    .share-row {
      display: flex;
      gap: 8px;
      width: 100%;
    }

    .share-row input {
      flex: 1;
      background: rgba(255, 184, 0, 0.05);
      border: 1px solid #FFB80055;
      color: #FFB800;
      padding: 10px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.75rem;
      min-width: 0;
    }

    .share-row button {
      padding: 0 16px;
      font-size: 0.75rem;
      white-space: nowrap;
    }

    .share-socials {
      display: flex;
      gap: 12px;
      width: 100%;
      justify-content: center;
      margin-top: 10px;
    }

    .social-btn {
      background: rgba(255, 184, 0, 0.1);
      border: 1px solid #FFB80055;
      color: #FFB800;
      padding: 10px;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .social-btn:hover {
      background: rgba(255, 184, 0, 0.3);
      border-color: #FFB800;
      box-shadow: 0 0 16px #FFB80044;
    }

    .social-btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }
  </style>
</head>

<body>

  <!-- Flash overlay -->
  <div id="flash"></div>

  <button id="share-btn">Share</button>

  <!-- Header -->
  <header>
    <h1>Whip App</h1>
    <p>as seen on The Big Bang Theory</p>
  </header>

  <!-- Main content -->
  <main>

    <!-- iOS permission screen (shown first on iOS) -->
    <div id="permission-screen" class="entry-screen" style="display:none;">
      <p>iOS requires permission to<br>access motion sensors.</p>
      <button id="enable-btn" class="action-btn">Enable Whip</button>
      <div id="denied-msg">
        Permission denied.<br>Go to <strong>Settings &rarr; Safari &rarr; Motion &amp; Orientation Access</strong> and
        try again.
      </div>
    </div>

    <!-- Start screen for non-iOS (unlocks audio via user gesture) -->
    <div id="start-screen" class="entry-screen" style="display:none;">
      <p>Tap to start, then snap your<br>phone like cracking a whip.</p>
      <button id="start-btn" class="action-btn">Start</button>
    </div>

    <!-- Main whip UI (hidden until permission granted / not needed) -->
    <div id="whip-ui" style="display:none; flex-direction:column; align-items:center; gap:32px;">

      <div id="whip-container">
        <!-- Inline SVG whip -->
        <svg id="whip-svg" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" class="idle">
          <!-- Handle -->
          <rect x="20" y="92" width="48" height="16" rx="5" fill="#FFB800" opacity="0.9" />
          <!-- Whip body: bezier curve that tapers -->
          <path d="M68 100 C100 60, 140 120, 170 85" stroke="#FFB800" stroke-width="5" stroke-linecap="round"
            stroke-linejoin="round" opacity="0.9" />
          <path d="M68 100 C100 60, 140 120, 170 85" stroke="#FFB800" stroke-width="2.5" stroke-linecap="round"
            stroke-linejoin="round" opacity="0.5" />
          <!-- Tip -->
          <path d="M170 85 C180 78, 185 72, 183 65" stroke="#FFB800" stroke-width="2" stroke-linecap="round"
            opacity="0.8" />
          <!-- Crack star at tip -->
          <g id="crack-star" transform="translate(183, 63)" opacity="0">
            <line x1="0" y1="-8" x2="0" y2="8" stroke="#FFB800" stroke-width="2" stroke-linecap="round" />
            <line x1="-8" y1="0" x2="8" y2="0" stroke="#FFB800" stroke-width="2" stroke-linecap="round" />
            <line x1="-6" y1="-6" x2="6" y2="6" stroke="#FFB800" stroke-width="1.5" stroke-linecap="round" />
            <line x1="6" y1="-6" x2="-6" y2="6" stroke="#FFB800" stroke-width="1.5" stroke-linecap="round" />
          </g>
        </svg>
      </div>

      <div id="counter-wrap">
        <div id="counter-label">Cracks</div>
        <span id="counter">0</span>
      </div>

      <!-- Tap to crack button (always visible) -->
      <button id="tap-btn" style="display:inline-block">[ Tap to Crack ]</button>

    </div>

  </main>

  <!-- Footer -->
  <footer id="footer-hint">Snap your phone like cracking a whip</footer>

  <!-- Share Modal -->
  <div id="share-modal">
    <div class="share-content">
      <h2>Share App</h2>
      <img id="share-qr" src="" alt="QR Code">
      <div class="share-row">
        <input type="text" id="share-url" readonly>
        <button id="copy-btn" class="action-btn">Copy</button>
      </div>
      <div class="share-socials">
        <a id="share-wa" href="#" target="_blank" class="social-btn" title="WhatsApp">
          <svg viewBox="0 0 24 24">
            <path
              d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z" />
          </svg>
        </a>
        <a id="share-tg" href="#" target="_blank" class="social-btn" title="Telegram">
          <svg viewBox="0 0 24 24">
            <path
              d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.446 1.394c-.14.18-.357.295-.6.295-.002 0-.003 0-.005 0l.213-3.054 5.56-5.022c.24-.213-.054-.334-.373-.121l-6.869 4.326-2.96-.924c-.64-.203-.658-.64.135-.954l11.566-4.458c.538-.196 1.006.128.833.94z" />
          </svg>
        </a>
        <a id="share-email" href="#" class="social-btn" title="Email">
          <svg viewBox="0 0 24 24">
            <path d="M12 12.713l-11.985-9.713h23.97l-11.985 9.713zm0 2.574l-12-9.725v15.438h24v-15.438l-12 9.725z" />
          </svg>
        </a>
      </div>
      <button id="close-modal-btn" class="action-btn"
        style="padding: 10px 16px; margin-top: 10px; font-size: 0.75rem; border-color: transparent; box-shadow: none;">Close</button>
    </div>
  </div>

  <script>
    // ─── State ───────────────────────────────────────────────────
    let audioCtx = null;
    let crackCount = 0;

    // Gesture detection state
    const TRIGGER_THRESHOLD = 25;   // m/s² adjusted magnitude
    const COOLDOWN_MS = 800;
    const CONSECUTIVE_NEEDED = 2;
    let lastCrackTime = 0;
    let consecutiveCount = 0;
    let nullAccelCount = 0;         // count null acceleration events → tap fallback
    let motionListenerActive = false;

    // DOM refs
    const flash = document.getElementById('flash');
    const permScreen = document.getElementById('permission-screen');
    const enableBtn = document.getElementById('enable-btn');
    const deniedMsg = document.getElementById('denied-msg');
    const whipUi = document.getElementById('whip-ui');
    const whipSvg = document.getElementById('whip-svg');
    const crackStar = document.getElementById('crack-star');
    const counterEl = document.getElementById('counter');
    const tapBtn = document.getElementById('tap-btn');
    const footerHint = document.getElementById('footer-hint');
    const startScreen = document.getElementById('start-screen');
    const startBtn = document.getElementById('start-btn');

    // ─── AudioContext ─────────────────────────────────────────────
    let audioUnlocked = false;

    function ensureAudioCtx() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    // Must be called from a user gesture (tap/click) to unlock audio on mobile
    function unlockAudio() {
      ensureAudioCtx();
      // Play a silent buffer to fully unlock the audio pipeline
      const buf = audioCtx.createBuffer(1, 1, audioCtx.sampleRate);
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      src.connect(audioCtx.destination);
      src.start(0);
      loadWhipSample().catch(() => { });
      audioUnlocked = true;
    }

    // ─── Whip sample playback ─────────────────────────────────────
    const WHIP_SAMPLE_PATH = '/assets/crack_the_whip.mp3';
    let whipSampleBuffer = null;
    let whipSampleLoadPromise = null;

    function decodeAudioDataCompat(ctx, arrayBuffer) {
      return new Promise((resolve, reject) => {
        try {
          const maybePromise = ctx.decodeAudioData(
            arrayBuffer,
            decoded => resolve(decoded),
            err => reject(err)
          );
          if (maybePromise && typeof maybePromise.then === 'function') {
            maybePromise.then(resolve).catch(reject);
          }
        } catch (err) {
          reject(err);
        }
      });
    }

    function loadWhipSample() {
      ensureAudioCtx();
      if (whipSampleBuffer) return Promise.resolve(whipSampleBuffer);
      if (whipSampleLoadPromise) return whipSampleLoadPromise;

      whipSampleLoadPromise = fetch(WHIP_SAMPLE_PATH, { cache: 'no-store' })
        .then(resp => {
          if (!resp.ok) throw new Error('Failed to load whip sample: ' + resp.status);
          return resp.arrayBuffer();
        })
        .then(arrayBuffer => decodeAudioDataCompat(audioCtx, arrayBuffer))
        .then(decoded => {
          whipSampleBuffer = decoded;
          return decoded;
        })
        .catch(err => {
          whipSampleLoadPromise = null;
          console.error('Whip sample load error:', err);
          throw err;
        });

      return whipSampleLoadPromise;
    }

    function playSampleBuffer() {
      if (!whipSampleBuffer) return false;
      ensureAudioCtx();
      const source = audioCtx.createBufferSource();
      source.buffer = whipSampleBuffer;

      const gain = audioCtx.createGain();
      gain.gain.value = 1.0;

      source.connect(gain);
      gain.connect(audioCtx.destination);
      source.start(audioCtx.currentTime + 0.001);
      return true;
    }

    function synthesizeWhipCrack() {
      if (playSampleBuffer()) return;
      loadWhipSample().then(() => {
        playSampleBuffer();
      }).catch(() => { });
    }

    // ─── Gesture detection ────────────────────────────────────────
    function onDeviceMotion(event) {
      const ag = event.accelerationIncludingGravity;
      if (!ag || ag.x === null || ag.y === null || ag.z === null) {
        nullAccelCount++;
        if (nullAccelCount > 10) activateTapFallback();
        return;
      }

      const magnitude = Math.sqrt(ag.x * ag.x + ag.y * ag.y + ag.z * ag.z);
      const adjusted = Math.abs(magnitude - 9.8);

      const now = Date.now();
      if (now - lastCrackTime < COOLDOWN_MS) {
        consecutiveCount = 0;
        return;
      }

      if (adjusted > TRIGGER_THRESHOLD) {
        consecutiveCount++;
        if (consecutiveCount >= CONSECUTIVE_NEEDED) {
          consecutiveCount = 0;
          lastCrackTime = now;
          triggerCrack();
        }
      } else {
        consecutiveCount = 0;
      }
    }

    function startMotionListener() {
      if (motionListenerActive) return;
      motionListenerActive = true;
      window.addEventListener('devicemotion', onDeviceMotion);
    }

    // ─── triggerCrack orchestrator ────────────────────────────────
    function triggerCrack() {
      // 1. Sound
      synthesizeWhipCrack();

      // 2. Haptic (Android; no-op on iOS)
      if (navigator.vibrate) navigator.vibrate([25, 15, 55]);

      // 3. Flash
      flash.classList.remove('active');
      void flash.offsetWidth;
      flash.classList.add('active');
      setTimeout(() => flash.classList.remove('active'), 360);

      // 4. Whip animation
      whipSvg.classList.remove('idle', 'cracking');
      void whipSvg.offsetWidth;
      whipSvg.classList.add('cracking');
      whipSvg.addEventListener('animationend', () => {
        whipSvg.classList.remove('cracking');
        whipSvg.classList.add('idle');
      }, { once: true });

      // 5. Crack star flash
      crackStar.style.opacity = '1';
      setTimeout(() => { crackStar.style.opacity = '0'; }, 150);

      // 6. Ring pulse
      const container = document.getElementById('whip-container');
      container.classList.remove('crack-ring');
      void container.offsetWidth;
      container.classList.add('crack-ring');
      container.addEventListener('animationend', () => container.classList.remove('crack-ring'), { once: true });

      // 7. Spark particles
      spawnSparks();

      // 8. Counter
      crackCount++;
      counterEl.textContent = crackCount;
      counterEl.classList.remove('bounce');
      void counterEl.offsetWidth;
      counterEl.classList.add('bounce');
    }

    // ─── Spark particles ──────────────────────────────────────────
    function spawnSparks() {
      const container = document.getElementById('whip-container');
      const count = 7;
      for (let i = 0; i < count; i++) {
        const spark = document.createElement('div');
        spark.className = 'spark';
        const angle = (i / count) * 2 * Math.PI;
        const dist = 55 + Math.random() * 35;
        const tx = Math.round(Math.cos(angle) * dist);
        const ty = Math.round(Math.sin(angle) * dist);
        spark.style.setProperty('--tx', tx + 'px');
        spark.style.setProperty('--ty', ty + 'px');
        container.appendChild(spark);
        // trigger reflow then add fly class
        void spark.offsetWidth;
        spark.classList.add('fly');
        spark.addEventListener('animationend', () => spark.remove(), { once: true });
      }
    }

    // ─── Tap fallback (desktop / no accelerometer) ────────────────
    function activateTapFallback() {
      motionListenerActive = false;
      window.removeEventListener('devicemotion', onDeviceMotion);
      tapBtn.style.display = 'inline-block';
      footerHint.textContent = 'Tap the button to crack the whip';
    }

    tapBtn.addEventListener('click', () => {
      if (!audioUnlocked) unlockAudio();
      triggerCrack();
    });

    // ─── iOS permission flow ──────────────────────────────────────
    function needsMotionPermission() {
      return (
        typeof DeviceMotionEvent !== 'undefined' &&
        typeof DeviceMotionEvent.requestPermission === 'function'
      );
    }

    enableBtn.addEventListener('click', async () => {
      unlockAudio(); // create & unlock audio inside user gesture for iOS audio policy
      try {
        const result = await DeviceMotionEvent.requestPermission();
        if (result === 'granted') {
          showWhipUi();
          startMotionListener();
        } else {
          deniedMsg.style.display = 'block';
          enableBtn.style.display = 'none';
        }
      } catch (err) {
        console.error('Motion permission error:', err);
        deniedMsg.style.display = 'block';
      }
    });

    // ─── UI transitions ───────────────────────────────────────────
    function showWhipUi() {
      permScreen.style.display = 'none';
      startScreen.style.display = 'none';
      whipUi.style.display = 'flex';
      whipUi.classList.add('fade-in');
    }

    function showPermissionScreen() {
      permScreen.style.display = 'flex';
      permScreen.classList.add('fade-in');
      startScreen.style.display = 'none';
      whipUi.style.display = 'none';
    }

    function showStartScreen() {
      startScreen.style.display = 'flex';
      startScreen.classList.add('fade-in');
      permScreen.style.display = 'none';
      whipUi.style.display = 'none';
    }

    // ─── Start button (non-iOS): unlocks audio via user gesture ──
    startBtn.addEventListener('click', () => {
      unlockAudio();
      showWhipUi();
      if (typeof DeviceMotionEvent !== 'undefined') {
        startMotionListener();
        setTimeout(() => {
          if (nullAccelCount > 5) activateTapFallback();
        }, 2000);
      } else {
        activateTapFallback();
      }
    });

    // ─── Share Logic ──────────────────────────────────────────────
    const shareBtn = document.getElementById('share-btn');
    const shareModal = document.getElementById('share-modal');
    const closeModalBtn = document.getElementById('close-modal-btn');
    const copyBtn = document.getElementById('copy-btn');
    const shareUrlInput = document.getElementById('share-url');
    const shareQrImg = document.getElementById('share-qr');

    shareBtn.addEventListener('click', () => {
      // Use clean url without query params/hash for sharing
      const url = window.location.href.split('?')[0].split('#')[0];
      const text = encodeURIComponent('Check out the Whip App!');
      const encodedUrl = encodeURIComponent(url);

      // Update links
      shareUrlInput.value = url;
      shareQrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=${encodedUrl}`;

      // Social Links
      document.getElementById('share-wa').href = `https://api.whatsapp.com/send?text=${text}%20${encodedUrl}`;
      document.getElementById('share-tg').href = `https://t.me/share/url?url=${encodedUrl}&text=${text}`;
      document.getElementById('share-email').href = `mailto:?subject=${text}&body=${encodedUrl}`;

      shareModal.classList.add('active');
    });

    closeModalBtn.addEventListener('click', () => {
      shareModal.classList.remove('active');
      copyBtn.textContent = 'Copy';
    });

    // Close modal when clicking outside the modal content
    shareModal.addEventListener('click', (e) => {
      if (e.target === shareModal) {
        shareModal.classList.remove('active');
        copyBtn.textContent = 'Copy';
      }
    });

    copyBtn.addEventListener('click', () => {
      shareUrlInput.select();
      shareUrlInput.setSelectionRange(0, 99999);
      if (navigator.clipboard) {
        navigator.clipboard.writeText(shareUrlInput.value).then(() => {
          copyBtn.textContent = 'Copied!';
        }).catch(() => {
          document.execCommand('copy');
          copyBtn.textContent = 'Copied!';
        });
      } else {
        document.execCommand('copy');
        copyBtn.textContent = 'Copied!';
      }
    });

    // ─── Init ─────────────────────────────────────────────────────
    function init() {
      if (needsMotionPermission()) {
        // iOS: needs motion permission (audio also unlocked via the enable button tap)
        showPermissionScreen();
      } else {
        // Non-iOS: show start screen so user taps to unlock audio before motion detection
        showStartScreen();
      }
    }

    document.addEventListener('DOMContentLoaded', init);

    // Service worker registration
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => { });
      });
    }
  </script>
</body>
